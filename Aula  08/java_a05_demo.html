body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:rgba(13,10,30,.95);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}

.cp-btn{background:none;border:1px solid rgba(255,255,255,.12);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s}
.cp-btn:hover{border-color:var(--accent);color:var(--accent)}
pre{padding:16px 20px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;color:#94a3b8}

.terminal{background:#020609;border-radius:8px;overflow:hidden;margin:10px 0;border:1px solid rgba(255,255,255,.08)}
.term-bar{background:rgba(255,255,255,.05);padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.06)}
.td{width:11px;height:11px;border-radius:50%}.tr2{background:#ff5f57}.ty{background:#ffbd2e}.tg{background:#28c840}

<script>
const DEMOS = [
  {
    title: 'try/catch básico — dividindo com segurança',
    sub: '~10 min · Crie TryCatchBasico.java',
    badge: 'badge-try', badgeLabel: 'try/catch',
    desc: 'O try/catch é o mecanismo fundamental de tratamento de exceções. Quando o código no bloco try lança uma exceção, a execução desvia imediatamente para o catch correspondente.',
    code: `<span class="ga">import</span> java.util.Scanner;

<span class="kw">public class</span> <span class="cl">TryCatchBasico</span> {
    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="cl">Scanner</span> sc = <span class="kw">new</span> <span class="cl">Scanner</span>(System.in);

        System.out.print(<span class="str">"Dividendo: "</span>);
        <span class="tp">int</span> a = sc.nextInt();
        System.out.print(<span class="str">"Divisor: "</span>);
        <span class="tp">int</span> b = sc.nextInt();

        <span class="kw">try</span> {
            <span class="cm">// Este bloco pode lançar ArithmeticException (b=0)</span>
            <span class="tp">int</span> resultado = a / b;
            System.out.println(<span class="str">"Resultado: "</span> + resultado);

        } <span class="kw">catch</span> (<span class="exc">ArithmeticException</span> e) {
            <span class="cm">// Captura APENAS ArithmeticException
            // e.getMessage() retorna: "/ by zero"</span>
            System.out.println(<span class="str">"Erro: "</span> + e.getMessage());

        } <span class="kw">finally</span> {
            <span class="cm">// Executa SEMPRE — com ou sem exceção</span>
            System.out.println(<span class="str">"Operação encerrada."</span>);
            sc.close();
        }
    }
}`,
    output: `<span class="term-err">Dividendo: 10
Divisor: 0
Erro: / by zero
Operação encerrada.</span>

<span style="color:#86efac">Dividendo: 10
Divisor: 2
Resultado: 5
Operação encerrada.</span>`,
    tip: '<strong>finally garante limpeza:</strong> mesmo que o catch relance a exceção ou o try retorne com return, o bloco finally executa. Por isso é ideal para fechar Scanner, arquivos e conexões de banco.'
  },
  {
    title: 'Múltiplos catch — tratando tipos diferentes',
    sub: '~10 min · Crie MultiplosCatch.java',
    badge: 'badge-try', badgeLabel: 'multi-catch',
    desc: 'Um try pode ter vários catch — um para cada tipo de exceção. O Java testa de cima para baixo e executa o primeiro catch compatível. Desde o Java 7, você pode agrupar tipos com |.',
    code: `<span class="ga">import</span> java.util.Scanner;
<span class="ga">import</span> java.util.InputMismatchException;

<span class="kw">public class</span> <span class="cl">MultiplosCatch</span> {
    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="cl">Scanner</span> sc = <span class="kw">new</span> <span class="cl">Scanner</span>(System.in);

        <span class="kw">try</span> {
            System.out.print(<span class="str">"Índice do array (0-4): "</span>);
            <span class="tp">int</span> idx = sc.nextInt();         <span class="cm">// pode: InputMismatchException</span>

            <span class="tp">int</span>[] nums = {<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>, <span class="num">40</span>, <span class="num">50</span>};
            System.out.println(nums[idx]);  <span class="cm">// pode: ArrayIndexOutOfBoundsException</span>

            System.out.println(<span class="num">100</span> / nums[idx]); <span class="cm">// pode: ArithmeticException (se idx=0 e nums[0]=0)</span>

        } <span class="kw">catch</span> (<span class="exc">InputMismatchException</span> e) {
            <span class="cm">// Mais específico: só captura entrada não-inteira</span>
            System.out.println(<span class="str">"Digite um número inteiro!"</span>);

        } <span class="kw">catch</span> (<span class="exc">ArrayIndexOutOfBoundsException</span> e) {
            <span class="cm">// Mais específico: só captura índice inválido</span>
            System.out.println(<span class="str">"Índice fora do intervalo [0-4]!"</span>);

        } <span class="kw">catch</span> (<span class="exc">ArithmeticException</span> | <span class="exc">RuntimeException</span> e) {
            <span class="cm">// Multi-catch (Java 7+): agrupa tipos com |
            // RuntimeException captura qualquer outra runtime exception</span>
            System.out.println(<span class="str">"Erro inesperado: "</span> + e.getClass().getSimpleName());

        } <span class="kw">finally</span> {
            sc.close();
        }
    }
}`,
    output: `<span class="term-err">Índice: abc
Digite um número inteiro!</span>

<span class="term-err">Índice: 9
Índice fora do intervalo [0-4]!</span>

<span style="color:#86efac">Índice: 2
30
3</span>`,
    tip: '<strong>Ordem dos catch importa:</strong> coloque sempre os mais específicos primeiro. Se colocar <code>Exception</code> antes de <code>ArithmeticException</code>, o compilador rejeita — o catch específico nunca seria alcançado.'
  },
  {
    title: 'throw e throws — lançando intencionalmente',
    sub: '~10 min · Crie ValidacaoIdade.java',
    badge: 'badge-chk', badgeLabel: 'throw/throws',
    desc: 'Use throw para lançar uma exceção intencionalmente quando detectar uma situação inválida. Use throws na assinatura para propagar para quem chamou.',
    code: `<span class="kw">public class</span> <span class="cl">ValidacaoIdade</span> {

    <span class="cm">// throws: declara que este método PODE lançar IllegalArgumentException
    // (unchecked — não obrigaria throws, mas documenta a intenção)</span>
    <span class="kw">static void</span> <span class="fn">validarIdade</span>(<span class="tp">int</span> idade) <span class="kw">throws</span> <span class="exc">IllegalArgumentException</span> {

        <span class="cm">// throw new: lança intencionalmente com mensagem descritiva</span>
        <span class="kw">if</span> (idade &lt; <span class="num">0</span>)
            <span class="kw">throw new</span> <span class="exc">IllegalArgumentException</span>(<span class="str">"Idade negativa: "</span> + idade);
        <span class="kw">if</span> (idade &gt; <span class="num">150</span>)
            <span class="kw">throw new</span> <span class="exc">IllegalArgumentException</span>(<span class="str">"Idade improvável: "</span> + idade);

        <span class="cm">// Se chegou aqui, a idade é válida</span>
        System.out.println(<span class="str">"Idade válida: "</span> + idade);
    }

    <span class="kw">static</span> <span class="tp">int</span> <span class="fn">calcularAno</span>(<span class="tp">int</span> idade) {
        <span class="fn">validarIdade</span>(idade); <span class="cm">// propaga a exceção se lançada</span>
        <span class="kw">return</span> <span class="num">2025</span> - idade;
    }

    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="tp">int</span>[] idades = {<span class="num">25</span>, -<span class="num">5</span>, <span class="num">200</span>, <span class="num">0</span>};

        <span class="kw">for</span> (<span class="tp">int</span> i : idades) {
            <span class="kw">try</span> {
                System.out.printf(<span class="str">"Idade %4d → nasceu em %d%n"</span>, i, <span class="fn">calcularAno</span>(i));
            } <span class="kw">catch</span> (<span class="exc">IllegalArgumentException</span> e) {
                System.out.printf(<span class="str">"Idade %4d → INVÁLIDA: %s%n"</span>, i, e.getMessage());
            }
        }
    }
}`,
    output: `Idade   25 → nasceu em 2000
Idade   -5 → INVÁLIDA: Idade negativa: -5
Idade  200 → INVÁLIDA: Idade improvável: 200
Idade    0 → nasceu em 2025`,
    tip: '<strong>IllegalArgumentException</strong> é a exceção padrão para argumentos inválidos — use-a quando um parâmetro viola um contrato esperado. É uma RuntimeException, portanto unchecked: o compilador não exige try/catch, mas o programa crasha se não tratada.'
  },
  {
    title: 'Checked exceptions — IOException simulada',
    sub: '~10 min · Crie LeituraArquivo.java',
    badge: 'badge-chk', badgeLabel: 'checked',
    desc: 'Checked exceptions são verificadas pelo compilador — você DEVE tratar com try/catch ou propagar com throws. IOException é o exemplo mais comum: leitura de arquivos pode sempre falhar.',
    code: `<span class="ga">import</span> java.io.*;

<span class="kw">public class</span> <span class="cl">LeituraArquivo</span> {

    <span class="cm">// throws IOException: obriga o chamador a tratar ou propagar</span>
    <span class="kw">static</span> <span class="cl">String</span> <span class="fn">lerPrimeiraLinha</span>(<span class="cl">String</span> caminho) <span class="kw">throws</span> <span class="exc">IOException</span> {
        <span class="cm">// BufferedReader: lê o arquivo linha a linha</span>
        <span class="cl">BufferedReader</span> br = <span class="kw">new</span> <span class="cl">BufferedReader</span>(<span class="kw">new</span> <span class="cl">FileReader</span>(caminho));
        <span class="kw">try</span> {
            <span class="kw">return</span> br.readLine();   <span class="cm">// IOException se o arquivo não abrir</span>
        } <span class="kw">finally</span> {
            br.close();              <span class="cm">// fecha sempre, mesmo se readLine lançar</span>
        }
    }

    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {

        <span class="cm">// FileNotFoundException é subclasse de IOException</span>
        <span class="kw">try</span> {
            <span class="cl">String</span> linha = <span class="fn">lerPrimeiraLinha</span>(<span class="str">"dados.txt"</span>);
            System.out.println(<span class="str">"Primeira linha: "</span> + linha);

        } <span class="kw">catch</span> (<span class="exc">FileNotFoundException</span> e) {
            <span class="cm">// Arquivo não existe — mais específico</span>
            System.out.println(<span class="str">"Arquivo não encontrado: "</span> + e.getMessage());

        } <span class="kw">catch</span> (<span class="exc">IOException</span> e) {
            <span class="cm">// Qualquer outro problema de I/O — mais genérico</span>
            System.out.println(<span class="str">"Erro de leitura: "</span> + e.getMessage());
        }
    }
}`,
    output: `<span class="term-err">Arquivo não encontrado: dados.txt (No such file or directory)</span>`,
    tip: '<strong>try-with-resources (Java 7+):</strong> uma forma mais elegante de garantir o fechamento: <code>try (BufferedReader br = new BufferedReader(...)) { ... }</code> — o Java fecha o recurso automaticamente ao sair do bloco, sem precisar de finally.'
  },
  {
    title: 'Exceção customizada — validador de CPF',
    sub: '~10 min · Crie ValidadorCPF.java',
    badge: 'badge-cus', badgeLabel: 'custom exception',
    desc: 'Crie exceções que descrevem problemas do seu domínio. Uma CpfInvalidoException é mais expressiva que IllegalArgumentException — o código se documenta.',
    code: `<span class="cm">// Exceção customizada para o domínio de validação de CPF</span>
<span class="kw">class</span> <span class="exc">CpfInvalidoException</span> <span class="kw">extends</span> <span class="exc">RuntimeException</span> {

    <span class="kw">private final</span> <span class="cl">String</span> cpf;
    <span class="kw">private final</span> <span class="cl">String</span> motivo;

    <span class="kw">public</span> <span class="fn">CpfInvalidoException</span>(<span class="cl">String</span> cpf, <span class="cl">String</span> motivo) {
        <span class="kw">super</span>(<span class="str">"CPF inválido ["</span> + cpf + <span class="str">"]: "</span> + motivo);
        <span class="kw">this</span>.cpf    = cpf;
        <span class="kw">this</span>.motivo = motivo;
    }

    <span class="kw">public</span> <span class="cl">String</span> <span class="fn">getCpf</span>()    { <span class="kw">return</span> cpf; }
    <span class="kw">public</span> <span class="cl">String</span> <span class="fn">getMotivo</span>() { <span class="kw">return</span> motivo; }
}

<span class="kw">public class</span> <span class="cl">ValidadorCPF</span> {

    <span class="kw">static void</span> <span class="fn">validar</span>(<span class="cl">String</span> cpf) {
        <span class="cm">// Guard clauses com exceção customizada</span>
        <span class="kw">if</span> (cpf == <span class="kw">null</span> || cpf.isBlank())
            <span class="kw">throw new</span> <span class="exc">CpfInvalidoException</span>(cpf, <span class="str">"não pode ser nulo ou vazio"</span>);

        <span class="cl">String</span> nums = cpf.replaceAll(<span class="str">"[^0-9]"</span>, <span class="str">""</span>); <span class="cm">// remove traços e pontos</span>

        <span class="kw">if</span> (nums.length() != <span class="num">11</span>)
            <span class="kw">throw new</span> <span class="exc">CpfInvalidoException</span>(cpf, <span class="str">"deve ter 11 dígitos, tem "</span> + nums.length());

        <span class="kw">if</span> (nums.chars().distinct().count() == <span class="num">1</span>)
            <span class="kw">throw new</span> <span class="exc">CpfInvalidoException</span>(cpf, <span class="str">"todos os dígitos iguais é inválido"</span>);

        System.out.println(<span class="str">"✅ CPF válido: "</span> + cpf);
    }

    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="cl">String</span>[] testes = {<span class="str">"123.456.789-09"</span>, <span class="str">"111.111.111-11"</span>, <span class="str">"12345"</span>, <span class="str">""</span>};

        <span class="kw">for</span> (<span class="cl">String</span> c : testes) {
            <span class="kw">try</span> {
                <span class="fn">validar</span>(c);
            } <span class="kw">catch</span> (<span class="exc">CpfInvalidoException</span> e) {
                System.out.println(<span class="str">"❌ "</span> + e.getMessage());
                System.out.println(<span class="str">"   Motivo: "</span> + e.getMotivo());
            }
        }
    }
}`,
    output: `✅ CPF válido: 123.456.789-09
<span class="term-err">❌ CPF inválido [111.111.111-11]: todos os dígitos iguais é inválido
   Motivo: todos os dígitos iguais é inválido
❌ CPF inválido [12345]: deve ter 11 dígitos, tem 5
   Motivo: deve ter 11 dígitos, tem 5
❌ CPF inválido []: não pode ser nulo ou vazio
   Motivo: não pode ser nulo ou vazio</span>`,
    tip: '<strong>Exceção como documentação:</strong> <code>CpfInvalidoException</code> comunica o domínio — quem lê o código entende imediatamente que a validação é de CPF, sem precisar de comentários. Isso é "código expressivo": a exceção descreve o problema do negócio, não apenas o erro técnico.'
  }
];

let doneSteps = new Set();

function build() {
  const el = document.getElementById('demos');
  DEMOS.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'demo-step' + (i === 0 ? ' active-step' : '');
    div.id = 'ds-' + i;
    div.innerHTML = `
      <div class="ds-head" onclick="togStep(${i})">
        <div class="ds-num">${i+1}</div>
        <div class="ds-info">
          <div class="ds-title">${d.title}</div>
          <div class="ds-sub">${d.sub}</div>
        </div>
        <span class="ds-badge ${d.badge}">${d.badgeLabel}</span>
      </div>
      <div class="ds-body"><div class="ds-bi">
        <div class="step-desc">${d.desc}</div>
        <div class="cb">
          <div class="cb-head"><span class="cb-lang">JAVA — ${d.badgeLabel}</span><button class="cp-btn" onclick="cpStep(this)">Copiar</button></div>
          <pre>${d.code}</pre>
        </div>
        <div class="terminal">
          <div class="term-bar"><span class="td tr2"></span><span class="td ty"></span><span class="td tg"></span><span class="term-title">Saída esperada</span></div>
          <div class="term-body">${d.output}</div>
        </div>
        <div class="tip-box">${d.tip}</div>
        <div class="ds-actions">
          <button class="ds-btn btn-done" onclick="markDone(${i})">✓ Feito — próxima demo</button>
        </div>
      </div></div>`;
    el.appendChild(div);
  });
}

function togStep(i) {
  const c = document.getElementById('ds-' + i);
  const isActive = c.classList.contains('active-step');
  document.querySelectorAll('.demo-step').forEach(x => x.classList.remove('active-step'));
  if (!isActive) c.classList.add('active-step');
}

function markDone(i) {
  doneSteps.add(i);
  const c = document.getElementById('ds-' + i);
  c.classList.remove('active-step'); c.classList.add('done-step');
  c.querySelector('.ds-num').textContent = '✓';
  const btn = c.querySelector('.btn-done');
  btn.textContent = 'Concluído!'; btn.disabled = true; btn.style.opacity = '.5';
  if (i + 1 < DEMOS.length) {
    const next = document.getElementById('ds-' + (i + 1));
    next.classList.add('active-step');
    setTimeout(() => next.scrollIntoView({ behavior:'smooth', block:'nearest' }), 150);
  }
}

function cpStep(btn) {
  const pre = btn.closest('.cb').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText);
  btn.textContent = 'Copiado!';
  setTimeout(() => btn.textContent = 'Copiar', 2000);
}

build();
</script>
</body>
</html>
